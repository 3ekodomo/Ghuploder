<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GH Uploader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ea44f">
</head>
<body>
    <div class="container">
        <header>
    <h1>GH Uploader</h1>
    <p>Upload directly to GitHub Pages</p>
    <select id="theme-selector">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
        <option value="black">Amoled Black</option>
    </select>
        </header>

        <section class="config-section">
            <input type="password" id="gh-token" placeholder="GitHub Personal Access Token" />
            <input type="text" id="gh-repo" placeholder="Owner/Repo (e.g., yourname/gh-uploader)" />
            <input type="text" id="gh-folder" placeholder="Folder (leave blank for root)" />
        </section>

        <section class="upload-section">
            <input type="file" id="file-input" accept="image/*, .pdf, .txt, .zip" />
            <button id="upload-btn">Upload File</button>
            <div id="status-message"></div>
        </section>

        <section class="history-section">
            <h2>Upload History</h2>
            <div id="history-list"></div>
        </section>
    </div>

    <div id="preview-modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modal-image">
    </div>

    <script src="app.js"></script>
</body>
</html>
